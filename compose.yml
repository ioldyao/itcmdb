services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: itcmdb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: itcmdb
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: itcmdb-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-itcmdb_redis_pass_2026}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-itcmdb_redis_pass_2026}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-itcmdb_redis_pass_2026}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - data-network

  # Kafka消息队列 - KRaft模式 (无需Zookeeper)
  kafka:
    image: apache/kafka:4.1.0
    container_name: itcmdb-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft模式配置
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: BROKER://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      # 其他配置
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - data-network

  # Kafka UI (可选)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: itcmdb-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: itcmdb
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KRAFTMODE: "true"
    networks:
      - data-network

  # 认证服务
  auth-service:
    build:
      context: ./services
      dockerfile: auth-service/Dockerfile
    container_name: itcmdb-auth-service
    ports:
      - "5001:5001"
      - "50001:50001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AUTH_ENV: production
      AUTH_SERVER_PORT: "5001"
      AUTH_GRPC_PORT: "50001"
      AUTH_LOG_LEVEL: info
      AUTH_DATABASE_HOST: postgres
      AUTH_DATABASE_PORT: 5433
      AUTH_DATABASE_USER: postgres
      AUTH_DATABASE_PASSWORD: postgres
      AUTH_DATABASE_DBNAME: itcmdb
      AUTH_DATABASE_SSLMODE: disable
      AUTH_REDIS_HOST: redis
      AUTH_REDIS_PORT: 6379
      AUTH_REDIS_PASSWORD: ${REDIS_PASSWORD:-itcmdb_redis_pass_2026}
      AUTH_REDIS_DB: 0
      AUTH_JWT_SECRET: your-secret-key-change-in-production
      AUTH_JWT_EXPIRATION: 24h
    networks:
      - backend-network
      - data-network
    restart: unless-stopped

  # CMDB服务
  cmdb-service:
    build:
      context: ./services
      dockerfile: cmdb-service/Dockerfile
    container_name: itcmdb-cmdb-service
    ports:
      - "5002:5002"
      - "50002:50002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      CMDB_ENV: production
      CMDB_SERVER_PORT: "5002"
      CMDB_GRPC_PORT: "50002"
      CMDB_LOG_LEVEL: info
      CMDB_DATABASE_HOST: postgres
      CMDB_DATABASE_PORT: 5433
      CMDB_DATABASE_USER: postgres
      CMDB_DATABASE_PASSWORD: postgres
      CMDB_DATABASE_DBNAME: itcmdb
      CMDB_DATABASE_SSLMODE: disable
      CMDB_REDIS_HOST: redis
      CMDB_REDIS_PORT: 6379
      CMDB_REDIS_PASSWORD: ${REDIS_PASSWORD:-itcmdb_redis_pass_2026}
      CMDB_REDIS_DB: 0
      CMDB_AUTH_GRPC_ADDRESS: auth-service:50001
      CMDB_VICTORIAMETRICS_ENDPOINT: https://10.120.43.230:8109
      CMDB_VICTORIAMETRICS_USERNAME: admin
      CMDB_VICTORIAMETRICS_PASSWORD: prometheus@123
    networks:
      - backend-network
      - data-network
    restart: unless-stopped

  # 工单服务
  ticket-service:
    build:
      context: ./services
      dockerfile: ticket-service/Dockerfile
    container_name: itcmdb-ticket-service
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      TICKET_ENV: production
      TICKET_SERVER_PORT: "5003"
      TICKET_LOG_LEVEL: info
      TICKET_DATABASE_HOST: postgres
      TICKET_DATABASE_PORT: 5433
      TICKET_DATABASE_USER: postgres
      TICKET_DATABASE_PASSWORD: postgres
      TICKET_DATABASE_DBNAME: itcmdb
      TICKET_DATABASE_SSLMODE: disable
      TICKET_JWT_SECRET: your-secret-key-change-in-production
      TICKET_JWT_EXPIRATION: 24h
    networks:
      - backend-network
      - data-network
    restart: unless-stopped

  # 告警服务
  alert-service:
    build:
      context: ./services
      dockerfile: alert-service/Dockerfile
    container_name: itcmdb-alert-service
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ALERT_ENV: production
      ALERT_SERVER_PORT: "5004"
      ALERT_LOG_LEVEL: info
      ALERT_DATABASE_HOST: postgres
      ALERT_DATABASE_PORT: 5433
      ALERT_DATABASE_USER: postgres
      ALERT_DATABASE_PASSWORD: postgres
      ALERT_DATABASE_DBNAME: itcmdb
      ALERT_DATABASE_SSLMODE: disable
      ALERT_JWT_SECRET: your-secret-key-change-in-production
      ALERT_JWT_EXPIRATION: 24h
    networks:
      - backend-network
      - data-network
    restart: unless-stopped

  # 通知服务
  notification-service:
    build:
      context: ./services
      dockerfile: notification-service/Dockerfile
    container_name: itcmdb-notification-service
    ports:
      - "5005:5005"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NOTIFICATION_ENV: production
      NOTIFICATION_SERVER_PORT: "5005"
      NOTIFICATION_LOG_LEVEL: info
      NOTIFICATION_JWT_SECRET: your-secret-key-change-in-production
      NOTIFICATION_JWT_EXPIRATION: 24h
    networks:
      - backend-network
      - data-network
    restart: unless-stopped

  # 报表服务
  report-service:
    build:
      context: ./services
      dockerfile: report-service/Dockerfile
    container_name: itcmdb-report-service
    ports:
      - "5006:5006"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REPORT_ENV: production
      REPORT_SERVER_PORT: "5006"
      REPORT_LOG_LEVEL: info
      REPORT_DATABASE_HOST: postgres
      REPORT_DATABASE_PORT: 5433
      REPORT_DATABASE_USER: postgres
      REPORT_DATABASE_PASSWORD: postgres
      REPORT_DATABASE_DBNAME: itcmdb
      REPORT_DATABASE_SSLMODE: disable
      REPORT_JWT_SECRET: your-secret-key-change-in-production
      REPORT_JWT_EXPIRATION: 24h
    networks:
      - backend-network
      - data-network
    restart: unless-stopped

  # 审计服务
  audit-service:
    build:
      context: ./services
      dockerfile: audit-service/Dockerfile
    container_name: itcmdb-audit-service
    ports:
      - "5007:5007"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AUDIT_ENV: production
      AUDIT_SERVER_PORT: "5007"
      AUDIT_LOG_LEVEL: info
      AUDIT_DATABASE_HOST: postgres
      AUDIT_DATABASE_PORT: 5433
      AUDIT_DATABASE_USER: postgres
      AUDIT_DATABASE_PASSWORD: postgres
      AUDIT_DATABASE_DBNAME: itcmdb
      AUDIT_DATABASE_SSLMODE: disable
      AUDIT_KAFKA_BROKERS: kafka:9092
      AUDIT_KAFKA_TOPIC: audit_logs
      AUDIT_KAFKA_GROUP_ID: audit_consumer
      AUDIT_CONSUMER_BATCH_SIZE: "100"
      AUDIT_CONSUMER_BATCH_TIMEOUT: 1s
      AUDIT_CONSUMER_WORKERS: "4"
    networks:
      - backend-network
      - data-network
    restart: unless-stopped

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itcmdb-frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - cmdb-service
      - ticket-service
      - alert-service
    networks:
      - frontend-network
      - backend-network
    restart: unless-stopped

  # API Gateway (使用Nginx)
  api-gateway:
    image: nginx:alpine
    container_name: itcmdb-api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - cmdb-service
      - ticket-service
      - alert-service
      - notification-service
      - report-service
    networks:
      - frontend-network
      - backend-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
  data-network:
    driver: bridge
