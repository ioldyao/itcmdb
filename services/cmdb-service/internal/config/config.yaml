server:
  port: 5002

env: development

log:
  level: info

jwt:
  secret: your-secret-key
  expiration: 24h

database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  dbname: itcmdb
  sslmode: disable

victoriametrics:
  # 单数据源配置（向后兼容）
  endpoint: https://10.120.43.230:8109
  username: admin
  password: prometheus@123
  sync_interval: 5m  # 容器同步间隔，默认5分钟

  # 多数据源配置（推荐使用）
  # 如果配置了数据源列表，则忽略上面的单数据源配置
  datasources:
    - name: "主数据中心"
      id: "primary-dc"
      endpoint: https://10.120.43.230:8109
      username: admin
      password: prometheus@123
      enabled: true
      # 可选：指定这个数据源负责哪些容器（通过容器名前缀匹配）
      # container_prefix: ["prod-", "staging-"]
      # 可选：标签，会自动添加到从该数据源同步的容器上
      labels:
        location: "主数据中心"
        environment: "production"

    - name: "备数据中心"
      id: "secondary-dc"
      endpoint: https://backup.example.com:8429
      username: admin
      password: backup_password
      enabled: true
      labels:
        location: "备数据中心"
        environment: "dr"

    - name: "开发环境"
      id: "dev-env"
      endpoint: https://dev.example.com:8429
      username: dev_user
      password: dev_password
      enabled: false  # 可以禁用某个数据源
      labels:
        location: "开发环境"
        environment: "development"
