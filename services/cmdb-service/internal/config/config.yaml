server:
  port: 5002

env: development

log:
  level: info

jwt:
  secret: your-secret-key
  expiration: 24h

database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  dbname: itcmdb
  sslmode: disable

victoriametrics:
  # 单数据源配置（向后兼容，不推荐使用）
  endpoint: https://10.120.43.230:8109
  username: admin
  password: prometheus@123
  sync_interval: 5m  # 容器同步间隔，默认5分钟

  # 多数据源配置通过Web界面管理（推荐）
  # 在系统配置 -> 监控配置中添加多个VictoriaMetrics数据源
  # 配置键: victoriametrics_datasources
  # 配置值: JSON格式的数据源数组
