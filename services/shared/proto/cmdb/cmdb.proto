syntax = "proto3";

package cmdb;

option go_package = "github.com/itcmdb/shared/proto/cmdb";

import "google/protobuf/struct.proto";

// CMDB服务
service CMDBService {
  // 获取CI实例
  rpc GetCIInstance(GetCIInstanceRequest) returns (GetCIInstanceResponse);

  // 获取CI实例列表
  rpc GetCIInstances(GetCIInstancesRequest) returns (GetCIInstancesResponse);

  // 获取CI类型
  rpc GetCIType(GetCITypeRequest) returns (GetCITypeResponse);

  // 获取CI类型列表
  rpc GetCITypes(GetCITypesRequest) returns (GetCITypesResponse);

  // 获取CI关系
  rpc GetCIRelations(GetCIRelationsRequest) returns (GetCIRelationsResponse);

  // 上报服务器硬件信息
  rpc ReportHardwareInfo(HardwareInfoReport) returns (HardwareInfoResponse);
}

// HardwareService - Agent使用的硬件信息上报服务（别名）
service HardwareService {
  // 上报服务器硬件信息
  rpc ReportHardwareInfo(HardwareInfoReport) returns (HardwareInfoResponse);
}

message GetCIInstanceRequest {
  uint64 id = 1;
}

message GetCIInstanceResponse {
  CIInstance instance = 1;
}

message GetCIInstancesRequest {
  uint64 ci_type_id = 1;
  map<string, string> filters = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetCIInstancesResponse {
  repeated CIInstance instances = 1;
  int64 total = 2;
}

message GetCITypeRequest {
  uint64 id = 1;
}

message GetCITypeResponse {
  CIType ci_type = 1;
}

message GetCITypesRequest {
}

message GetCITypesResponse {
  repeated CIType ci_types = 1;
}

message GetCIRelationsRequest {
  uint64 ci_id = 1;
}

message GetCIRelationsResponse {
  repeated CIRelation relations = 1;
}

message CIInstance {
  uint64 id = 1;
  uint64 ci_type_id = 2;
  string name = 3;
  string status = 4;
  google.protobuf.Struct attributes = 5;
  string created_at = 6;
  string updated_at = 7;
  CIType ci_type = 8;
}

message CIType {
  uint64 id = 1;
  string name = 2;
  string display_name = 3;
  string icon = 4;
  string description = 5;
  bool is_active = 6;
}

message CIRelation {
  uint64 id = 1;
  uint64 parent_id = 2;
  uint64 child_id = 3;
  string relation_type = 4;
  string description = 5;
  CIInstance parent = 6;
  CIInstance child = 7;
}

// ==================== 硬件信息上报 ====================

// 硬件信息上报
message HardwareInfoReport {
  ReportInfo report_info = 1;
  repeated MemoryInfo memory = 2;
  repeated StorageInfo storage = 3;
  repeated GPUInfo gpu = 4;
  repeated NetworkInfo network = 5;
  repeated PowerSupplyInfo power_supply = 6;
  repeated OpticalModuleInfo optical_modules = 7;
}

// 上报信息
message ReportInfo {
  string timestamp = 1;
  string hostname = 2;
  string system_serial = 3;
}

// 内存信息
message MemoryInfo {
  string size = 1;
  string form_factor = 2;
  string locator = 3;
  string type = 4;
  string speed = 5;
  string manufacturer = 6;
  string part_number = 7;
  string serial = 8;
}

// 存储信息
message StorageInfo {
  string name = 1;
  string size = 2;
  string model = 3;
  string serial = 4;
}

// GPU信息
message GPUInfo {
  string gpu_id = 1;
  string product_name = 2;
  string serial = 3;
}

// 网卡信息
message NetworkInfo {
  string vendor = 1;
  string model = 2;
  string speed = 3;
  string mac = 4;
  string firmware = 5;
  string serial = 6;
}

// 电源信息
message PowerSupplyInfo {
  string location = 1;
  string name = 2;
  string manufacturer = 3;
  string serial = 4;
  string model = 5;
  string capacity = 6;
}

// 光模块信息
message OpticalModuleInfo {
  string pci_addr = 1;
  string port = 2;
  string ib_ca = 3;
  string identifier = 4;
  string vendor_name = 5;
  string part_number = 6;
  string serial_number = 7;
  string speed = 8;
  string temperature = 9;
  string wavelength = 10;
}

// 硬件信息上报响应
message HardwareInfoResponse {
  bool success = 1;
  string message = 2;
  uint64 ci_instance_id = 3;
}
