syntax = "proto3";

package ticket;

option go_package = "github.com/itcmdb/shared/proto/ticket";

// 工单服务
service TicketService {
  // 获取工单
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);

  // 获取工单列表
  rpc GetTickets(GetTicketsRequest) returns (GetTicketsResponse);

  // 创建工单
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);

  // 更新工单状态
  rpc UpdateTicketStatus(UpdateTicketStatusRequest) returns (UpdateTicketStatusResponse);
}

message GetTicketRequest {
  uint32 id = 1;
}

message GetTicketResponse {
  Ticket ticket = 1;
}

message GetTicketsRequest {
  string status = 1;
  string priority = 2;
  uint32 assignee_id = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message GetTicketsResponse {
  repeated Ticket tickets = 1;
  int64 total = 2;
}

message CreateTicketRequest {
  string title = 1;
  string description = 2;
  uint32 template_id = 3;
  string priority = 4;
  uint32 requester_id = 5;
}

message CreateTicketResponse {
  Ticket ticket = 1;
}

message UpdateTicketStatusRequest {
  uint32 id = 1;
  string status = 2;
  uint32 user_id = 3;
}

message UpdateTicketStatusResponse {
  Ticket ticket = 1;
}

message Ticket {
  uint32 id = 1;
  string title = 2;
  string description = 3;
  uint32 template_id = 4;
  uint32 workflow_id = 5;
  string status = 6;
  string priority = 7;
  uint32 assignee_id = 8;
  uint32 requester_id = 9;
  string sla_deadline = 10;
  string created_at = 11;
  string updated_at = 12;
}
